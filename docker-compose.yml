services:
  bot:
    build: .
    container_name: coderagent-bot
    restart: always

    env_file:
      - .env

    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./coderagent.db:/app/coderagent.db

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: coderagent-network