services:
  bot:
    build: .
    restart: always
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      BOT_PREFIX: ${BOT_PREFIX}
      OWNER_ID: ${OWNER_ID}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      DATABASE_URL: ${DATABASE_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      LOG_LEVEL: ${LOG_LEVEL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./storage:/app/storage
      - ./logs:/app/logs
      - coderagent_data:/app/data

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  coderagent_data:

networks:
  default:
    external: true
    name: coderagent-network